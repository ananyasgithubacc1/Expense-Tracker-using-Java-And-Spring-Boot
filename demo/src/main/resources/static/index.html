<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;

            background-image: url('background.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-color: #f4f7f6;
        }
        .container {
            background: lightblue;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h2 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px;}


        form { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button {
            background-color: #3498db;
            color: white;
            padding: 12px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }

        .expense-list { display: flex; flex-direction: column; gap: 12px; }
        .expense-item {
            display: flex;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            border-left: 5px solid #3498db;
        }
        .expense-details { display: flex; flex-direction: column; gap: 4px; }
        .expense-desc { font-weight: bold; color: #2c3e50; }
        .expense-cat { font-size: 0.85em; color: #7f8c8d; text-transform: uppercase; }
        .expense-amount { font-weight: bold; color: #e74c3c; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <h2>Expense Dashboard</h2>

    <form id="expenseForm">
        <input type="text" id="description" placeholder="Snacks" required>
        <input type="number" id="amount" placeholder="500" step="0.01" required>
        <select id="category" required>
            <option value="">Select a Category...</option>
            <option value="Food">Food</option>
            <option value="Clothes">Clothes</option>
            <option value="Bills">Bills</option>
            <option value="Rent">Rent</option>
        </select>
        <button type="submit">Save Expense</button>
    </form>

    <div id="expensesList" class="expense-list">
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api/expenses';

    async function loadExpenses() {
        try {
            const response = await fetch(API_URL);
            const expenses = await response.json();

            const list = document.getElementById('expensesList');
            list.innerHTML = '';

            expenses.forEach(expense => {
                const item = document.createElement('div');
                item.className = 'expense-item';
                item.innerHTML = `
                    <div class="expense-details">
                        <span class="expense-desc">${expense.description}</span>
                        <span class="expense-cat">${expense.category} • ID: ${expense.id}</span>
                    </div>
                    <span class="expense-amount">₹${expense.amount.toFixed(2)}</span>
                `;
                list.appendChild(item);
            });
        } catch (error) {
            console.error('Error fetching data. Is Spring Boot running?', error);
        }
    }

    // 2. POST: Send form data to the database
    document.getElementById('expenseForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // Stop the page from refreshing

        // Build the JSON object from the form inputs
        const newExpense = {
            description: document.getElementById('description').value,
            amount: parseFloat(document.getElementById('amount').value),
            category: document.getElementById('category').value
        };

        // Shoot it over to the Spring Boot server
        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newExpense)
        });

        // Clear the form and instantly reload the list with the new data
        document.getElementById('expenseForm').reset();
        loadExpenses();
    });

    // Trigger the initial load when you open the file
    loadExpenses();
</script>
</body>
</html>
